{% load static %}
<div id="chat-bot-container" class="chat-bot-closed" aria-live="polite">
  <button id="chat-toggle" class="chat-toggle-btn" aria-expanded="false" aria-controls="chat-window">💬</button>

  <div id="chat-window" class="chat-window" role="dialog" aria-hidden="true">
    <div class="chat-header">
      <div class="chat-title">Assistant</div>
      <button id="chat-close" class="chat-close-btn" aria-label="Close chat">×</button>
    </div>

    <div id="chat-messages" class="chat-messages" tabindex="0"></div>

    <div class="chat-input">
      <textarea id="chat-input" class="chat-textarea" placeholder="Type a message..." rows="1" aria-label="Message"></textarea>
      <button id="chat-send" class="chat-send-btn">Send</button>
    </div>
  </div>
</div>
